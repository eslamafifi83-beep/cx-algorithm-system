<html lang="en">
<head>

<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<script defer src="/_vercel/insights/script.js"></script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Oswald:wght@500;600&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="assets/logo.png" />
<style>
  :root {
    --midnight: #0C1128;
    --midnight-deep: #090D20;
    --panel: #121938;
    --card: #151D42;
    --gold: #E9A33D;
    --gold-light: #F4C069;
    --gold-deep: #C9862A;
    --blue: #6FA8DC;
    --blue-light: #9CC4E8;
    --text: #F2F1EC;
    --muted: #A7ADC9;
    --hairline: rgba(242, 241, 236, 0.10);
    --hairline-gold: rgba(233, 163, 61, 0.35);
    --display: "Poppins", system-ui, sans-serif;
    --body: "Poppins", system-ui, sans-serif;
    --mono: "Poppins", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --gutter: clamp(1.25rem, 5vw, 4.5rem);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--body);
    background:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(59, 78, 158, 0.25), transparent 70%),
      var(--midnight);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .container { max-width: 1360px; margin: 0 auto; padding-left: var(--gutter); padding-right: var(--gutter); }
  ::selection { background: var(--gold); color: var(--midnight); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  .site-header {
    position: sticky; top: 0; z-index: 90;
    background: rgba(12, 17, 40, 0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--hairline);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; height: 5.25rem; }
  .brand { display: flex; align-items: center; gap: 0.875rem; text-decoration: none; color: var(--text); flex: none; }
  .brand-mark { width: 46px; height: 46px; border-radius: 12px; display: block; }
  .brand-name { font-family: var(--display); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; line-height: 1.45; text-transform: uppercase; }
  .brand-name span { color: var(--gold); }
  .site-nav { display: flex; align-items: center; gap: clamp(1rem, 2.5vw, 2.25rem); }
  .site-nav a {
    font-family: var(--display); font-size: 0.8125rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text); text-decoration: none; padding: 0.375rem 0; position: relative; opacity: 0.85;
    transition: opacity 0.25s var(--ease), color 0.25s var(--ease);
  }
  .site-nav a::after { content: ""; position: absolute; left: 0; bottom: -4px; width: 100%; height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.3s var(--ease); }
  .site-nav a:hover { opacity: 1; color: var(--gold-light); }
  .site-nav a:hover::after, .site-nav a[aria-current="page"]::after { transform: scaleX(1); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.625rem;
    font-family: var(--display); font-weight: 700; font-size: 0.8125rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.875rem 1.75rem; border-radius: 999px; text-decoration: none; cursor: pointer; border: none; min-height: 44px;
    transition: transform 0.2s var(--ease), box-shadow 0.3s var(--ease);
  }
  .btn-gold { background: linear-gradient(180deg, var(--gold-light), var(--gold)); color: #2A1D05; box-shadow: 0 6px 24px rgba(233, 163, 61, 0.28); }
  .btn-gold:hover { box-shadow: 0 10px 32px rgba(233, 163, 61, 0.42); transform: translateY(-1px); }

  main { padding: clamp(2rem, 5vw, 3.5rem) 0 clamp(3rem, 7vw, 5.5rem); }
  .crumb { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .crumb a { color: var(--muted); text-decoration: none; }
  .crumb a:hover { color: var(--gold-light); }
  .crumb .sep { margin: 0 0.5rem; color: var(--hairline-gold); }
  .meta-row { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.14em; color: var(--gold); text-transform: uppercase; }
  .meta-row .dim { color: var(--muted); }
  h1.ep-title { font-family: var(--display); font-weight: 800; font-size: clamp(1.75rem, 3.8vw, 2.875rem); letter-spacing: -0.015em; line-height: 1.15; margin: 0.5rem 0 1.75rem; max-width: 26ch; }

  /* Player card */
  .player-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--hairline);
    border-radius: 20px;
    padding: clamp(1rem, 2vw, 1.375rem);
    margin-bottom: clamp(2rem, 4vw, 3rem);
  }
  .mode-toggle {
    display: inline-flex;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 1rem;
  }
  .mode-toggle button {
    font-family: var(--display); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    border: none; border-radius: 999px; padding: 0.55rem 1.5rem; cursor: pointer;
    background: transparent; color: var(--muted);
    transition: background 0.25s var(--ease), color 0.25s var(--ease);
  }
  .mode-toggle button.active { background: var(--gold); color: #12203C; }
  .player-area iframe { display: block; width: 100%; border: 0; border-radius: 14px; }
  .player-area video { display: block; width: 100%; max-height: 560px; border-radius: 14px; background: #0A1330; }
  .player-area audio { display: block; width: 100%; }
  .audio-shell {
    display: flex; align-items: center; gap: 1rem;
    background: radial-gradient(120% 160% at 30% 20%, #1C2F57, #0E1C3B);
    border-radius: 14px; padding: 1.1rem 1.25rem;
  }
  .audio-shell .disc {
    width: 52px; height: 52px; border-radius: 50%; flex: none;
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    display: grid; place-items: center; color: #12203C;
  }
  .audio-shell audio { flex: 1; }
  .no-media {
    border-radius: 14px;
    background: radial-gradient(120% 160% at 30% 20%, #1C2F57, #0E1C3B);
    padding: 2.5rem 1.5rem;
    text-align: center;
    color: var(--muted);
  }
  .also-on { display: flex; align-items: center; gap: 0.875rem; flex-wrap: wrap; margin-top: 1rem; }
  .also-on .lbl { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.22em; color: var(--muted); }
  .also-pill {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--display); font-size: 0.78rem; font-weight: 600;
    color: var(--text); text-decoration: none;
    border: 1px solid var(--hairline); border-radius: 999px; padding: 0.45rem 1rem;
    transition: border-color 0.25s var(--ease), color 0.25s var(--ease);
  }
  .also-pill:hover { border-color: var(--gold); color: var(--gold-light); }
  .also-pill .dot-sp { width: 9px; height: 9px; border-radius: 50%; background: #1DB954; }
  .also-pill .dot-ap { width: 9px; height: 9px; border-radius: 50%; background: #9933CC; }

  /* Body columns */
  .body-grid { display: grid; grid-template-columns: 1fr 360px; gap: clamp(1.75rem, 3.5vw, 2.75rem); align-items: start; }
  .section-block { margin-bottom: clamp(1.75rem, 3.5vw, 2.5rem); }
  .section-block h2 { font-family: var(--display); font-weight: 700; font-size: 1.25rem; margin-bottom: 0.875rem; }
  .section-block p { color: var(--muted); max-width: 68ch; margin-bottom: 0.875rem; }
  .takeaway { display: flex; gap: 0.875rem; align-items: flex-start; margin-bottom: 0.75rem; color: var(--muted); }
  .takeaway .n {
    width: 26px; height: 26px; border-radius: 7px; flex: none;
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    color: #12203C; font-family: var(--mono); font-size: 0.7rem; font-weight: 500;
    display: grid; place-items: center; margin-top: 0.2rem;
  }
  .chapter { display: flex; gap: 1.25rem; align-items: baseline; padding: 0.65rem 0.25rem; border-top: 1px solid var(--hairline); }
  .chapter:last-child { border-bottom: 1px solid var(--hairline); }
  .chapter .t { font-family: var(--mono); font-size: 0.75rem; color: var(--gold); flex: none; width: 3.5rem; }
  .chapter .l { color: var(--muted); font-size: 0.95rem; }
  .resource { display: flex; gap: 0.75rem; align-items: center; padding: 0.55rem 0.25rem; color: var(--blue-light); text-decoration: none; font-size: 0.95rem; }
  .resource:hover { color: var(--gold-light); }
  .resource svg { flex: none; }

  .guest-card {
    position: sticky; top: 6.5rem;
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .guest-card .lbl { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.24em; color: var(--gold); margin-bottom: 1rem; }
  .guest-card .avatar {
    width: 76px; height: 76px; border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--display); font-weight: 700; font-size: 1.3rem; color: #12203C;
    background: linear-gradient(135deg, #F4C069, #E9A33D);
    margin-bottom: 0.875rem;
  }
  .guest-card .gname { font-family: var(--display); font-weight: 700; font-size: 1.15rem; }
  .guest-card .grole { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; }
  .guest-card blockquote {
    border-left: 2px solid var(--gold);
    padding-left: 0.875rem;
    font-family: var(--display);
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .guest-card .gbio { color: var(--muted); font-size: 0.875rem; }

  /* Related */
  .related { margin-top: clamp(2.5rem, 5vw, 4rem); }
  .related h2 { font-family: var(--display); font-weight: 700; font-size: 1.375rem; margin-bottom: 1.25rem; }
  .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  .rel-card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 1.25rem;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.3s var(--ease), border-color 0.3s var(--ease);
  }
  .rel-card:hover { transform: translateY(-3px); border-color: var(--hairline-gold); }
  .rel-card .meta { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 0.5rem; text-transform: uppercase; }
  .rel-card .t { font-family: var(--display); font-weight: 600; font-size: 1.02rem; line-height: 1.35; margin-bottom: 0.5rem; }
  .rel-card .g { color: var(--muted); font-size: 0.85rem; }

  .footer { background: var(--midnight-deep); border-top: 1px solid var(--hairline); padding: 2rem 0; }
  .footer-inner { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
  .footer a { color: var(--muted); text-decoration: none; font-family: var(--display); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .footer a:hover { color: var(--gold-light); }
  .footer .copy { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em; color: var(--muted); }

  @media (max-width: 1024px) {
    .body-grid { grid-template-columns: 1fr; }
    .guest-card { position: static; }
    .related-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 960px) {
    .site-nav { display: none; }
    .site-nav.open {
      display: flex;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: calc(100dvh - 5.25rem);
      overflow-y: auto;
      background: var(--midnight-deep);
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 3rem;
      gap: 0;
      z-index: 80;
    }
    .site-nav.open a {
      font-size: 1.25rem;
      padding: 1.125rem 0;
      width: 80%;
      text-align: center;
      border-bottom: 1px solid var(--hairline);
    }
    .header-subscribe { display: none; }
    .mobile-toggle {
      display: grid;
      place-items: center;
      width: 44px; height: 44px;
      background: transparent;
      border: 1.5px solid var(--hairline-gold);
      border-radius: 12px;
      color: var(--gold);
      cursor: pointer;
    }
  }
</style>
</head>
<body>

  <div class="container footer-inner">

    <span class="copy">© 2026 THE CX ALGORITHM PODCAST · HOSTED BY DR ESLAM AFIFI</span>
  </div>
</footer>

<script>
  const esc = s => { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; };
  const escAttr = s => esc(s).replace(/"/g, '&quot;');
  const initials = name => (name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('') || 'CX';
  const epNum = (ep, i) => { const m = /\d+/.exec(ep.eyebrow || ''); return m ? m[0].padStart(2, '0') : String(i + 1).padStart(2, '0'); };

  function spotifyEmbed(u) {
    try {
      const url = new URL(u);
      if (!url.hostname.includes('spotify.com')) return null;
      const p = url.pathname.startsWith('/embed/') ? url.pathname : '/embed' + url.pathname;
      return 'https://open.spotify.com' + p;
    } catch (e) { return null; }
  }
  const isLocalMedia = v => /^assets\//.test(v || '');

  function playerHTML(ep, mode) {
    const src = mode === 'video' ? ep.video : ep.audio;
    if (!src) {
      return `<div class="no-media">This episode's ${mode} isn't available yet. Check back soon.</div>`;
    }
    const sp = spotifyEmbed(src);
    if (sp) {
      const h = mode === 'video' ? 352 : 152;
      return `<iframe src="${escAttr(sp)}" height="${h}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Spotify player"></iframe>`;
    }
    if (isLocalMedia(src)) {
      if (mode === 'video') {
        return `<video controls preload="metadata" ${ep.image ? `poster="${escAttr(ep.image)}"` : ''} src="${escAttr(src)}"></video>`;
      }
      return `
        <div class="audio-shell">
          <span class="disc" aria-hidden="true">
            <svg width="18" height="20" viewBox="0 0 12 14" fill="currentColor"><path d="M0 0 L12 7 L0 14 Z"/></svg>
          </span>
          <audio controls preload="metadata" src="${escAttr(src)}"></audio>
        </div>`;
    }
    // Unknown external URL: link out
    return `<div class="no-media"><a class="btn btn-gold" href="${escAttr(src)}" target="_blank" rel="noopener">Open episode ${mode}</a></div>`;
  }

  function linesOf(v) { return String(v || '').split('\n').map(s => s.trim()).filter(Boolean); }
  function parasOf(v) { return String(v || '').split(/\n\s*\n/).map(s => s.trim()).filter(Boolean); }

  let content = null, ep = null, epIdx = 0, mode = 'audio';

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.getElementById('playerArea').innerHTML = playerHTML(ep, m);
  }

  function render() {
    const n = epNum(ep, epIdx);
    document.title = (ep.title ? ep.title + ' — ' : '') + 'The CX Algorithm Podcast';
    const canon = document.getElementById('canonicalLink');
    if (canon) canon.href = 'https://www.thecxalgorithm.com/episode?ep=' + epIdx;
    const meta = ['EPISODE ' + n];
    if (ep.date) meta.push(esc(ep.date));
    if (ep.duration) meta.push(esc(ep.duration));

    const hasVideo = !!ep.video, hasAudio = !!ep.audio;
    mode = new URLSearchParams(location.search).get('mode') === 'video' && hasVideo ? 'video'
         : (hasAudio ? 'audio' : (hasVideo ? 'video' : 'audio'));

    const about = parasOf(ep.about).length ? parasOf(ep.about) : (ep.description ? [ep.description] : []);
    const takeaways = linesOf(ep.takeaways);
    const chapters = linesOf(ep.chapters).map(l => { const i = l.indexOf('|'); return i < 0 ? { t: '', l } : { t: l.slice(0, i).trim(), l: l.slice(i + 1).trim() }; });
    const resources = linesOf(ep.resources).map(l => { const i = l.indexOf('|'); return i < 0 ? { label: l, url: '' } : { label: l.slice(0, i).trim(), url: l.slice(i + 1).trim() }; });

    const also = [];
    if (content.links && content.links.spotify) also.push(`<a class="also-pill" href="${escAttr(content.links.spotify)}" target="_blank" rel="noopener"><span class="dot-sp"></span>Spotify</a>`);
    if (content.links && content.links.apple) also.push(`<a class="also-pill" href="${escAttr(content.links.apple)}" target="_blank" rel="noopener"><span class="dot-ap"></span>Apple Podcasts</a>`);

    const others = content.episodes.map((e, i) => ({ e, i })).filter(({ i }) => i !== epIdx).slice(-3).reverse();

    document.getElementById('page').innerHTML = `
      <nav class="crumb" aria-label="Breadcrumb">
        <a href="episodes.html">Episodes</a><span class="sep">/</span>Episode ${n}
      </nav>
      <p class="meta-row">${meta.join(' <span class="dim">·</span> ')}</p>
      <h1 class="ep-title">${esc(ep.title || 'Untitled episode')}</h1>

      <div class="player-card">
        ${(hasVideo && hasAudio) ? `
        <div class="mode-toggle" role="tablist" aria-label="Player mode">
          <button type="button" data-mode="video" role="tab">Video</button>
          <button type="button" data-mode="audio" role="tab">Audio</button>
        </div>` : ''}
        <div class="player-area" id="playerArea"></div>
        ${also.length ? `<div class="also-on"><span class="lbl">ALSO ON</span>${also.join('')}</div>` : ''}
      </div>

      <div class="body-grid">
        <div>
          ${about.length ? `<section class="section-block"><h2>About this episode</h2>${about.map(p => `<p>${esc(p)}</p>`).join('')}</section>` : ''}
          ${takeaways.length ? `<section class="section-block"><h2>Key takeaways</h2>${takeaways.map((t, i) => `<div class="takeaway"><span class="n">${String(i + 1).padStart(2, '0')}</span><span>${esc(t)}</span></div>`).join('')}</section>` : ''}
          ${chapters.length ? `<section class="section-block"><h2>Show notes</h2>${chapters.map(c => `<div class="chapter"><span class="t">${esc(c.t)}</span><span class="l">${esc(c.l)}</span></div>`).join('')}</section>` : ''}
          ${resources.length ? `<section class="section-block"><h2>Resources mentioned</h2>${resources.map(r => `
            <a class="resource" href="${escAttr(r.url || '#')}" ${r.url ? 'target="_blank" rel="noopener"' : ''}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5.5 8.5 L12 2 M12 2 H8 M12 2 V6 M11 8.5 V11.5 C11 12.3 10.3 13 9.5 13 H2.5 C1.7 13 1 12.3 1 11.5 V4.5 C1 3.7 1.7 3 2.5 3 H5.5"/></svg>
              ${esc(r.label)}</a>`).join('')}</section>` : ''}
        </div>
        ${ep.guest ? `
        <aside class="guest-card">
          <p class="lbl">THE GUEST</p>
          <div class="avatar">${esc(initials(ep.guest))}</div>
          <p class="gname">${esc(ep.guest)}</p>
          <p class="grole">${esc(ep.role || '')}</p>
          ${ep.guestQuote ? `<blockquote>“${esc(ep.guestQuote)}”</blockquote>` : ''}
          ${ep.guestBio ? `<p class="gbio">${esc(ep.guestBio)}</p>` : ''}
        </aside>` : '<div></div>'}
      </div>

      ${others.length ? `
      <section class="related">
        <h2>Related episodes</h2>
        <div class="related-grid">
          ${others.map(({ e, i }) => `
            <a class="rel-card" href="episode.html?ep=${i}">
              <p class="meta">EP ${epNum(e, i)}${e.date ? ' · ' + esc(e.date) : ''}</p>
              <p class="t">${esc(e.title || 'Untitled episode')}</p>
              <p class="g">${esc(e.guest || '')}${e.duration ? ' · ' + esc(e.duration) : ''}</p>
            </a>`).join('')}
        </div>
      </section>` : ''}
    `;

    document.querySelectorAll('.mode-toggle button').forEach(b =>
      b.addEventListener('click', () => setMode(b.dataset.mode)));
    setMode(mode);
  }

  (async function init() {
    try {
      const res = await fetch('/api/content', { cache: 'no-store' });
      content = await res.json();
      content.episodes = content.episodes || [];
      epIdx = Math.max(0, Math.min(content.episodes.length - 1, parseInt(new URLSearchParams(location.search).get('ep') || String(content.episodes.length - 1), 10) || 0));
      ep = content.episodes[epIdx];
      if (!ep) throw new Error('No episodes yet');
      render();
    } catch (e) {
      document.getElementById('page').innerHTML =
        '<p class="crumb"><a href="episodes.html">Episodes</a></p><p style="color:var(--muted)">This episode could not be found. <a style="color:var(--gold-light)" href="episodes.html">Browse all episodes</a>.</p>';
    }
  })();
  const navToggle = document.getElementById('navToggle');
  if (navToggle) {
    const siteNav = document.getElementById('siteNav');
    navToggle.addEventListener('click', () => {
      const open = siteNav.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', String(open));
    });
    siteNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      siteNav.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    }));
  }
</script>

<script src="assets/nav.js"></script>
</body>
</html>
